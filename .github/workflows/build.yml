name: Build AI Services

on:
  push:
    branches:
      - master

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: sky-500813
  REGION: asia-southeast1
  GAR_LOCATION: asia-southeast1
  REPOSITORY: enterprise-ai-copilot
  IMAGE_NAME: ai-services

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true


      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2


      - name: Configure Docker
        run: |
          gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet


      - name: Build image
        run: |
          docker build \
          -t asia-southeast1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          .


      - name: Push image
        run: |
          docker push \
          asia-southeast1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}